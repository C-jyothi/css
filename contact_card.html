<!DOCTYPE html>
<html>
<head>
    <title>Contact Card</title>

    <style>
        /* Fixed Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 22px;
        }

        /* Main Container */
        .container {
            position: relative;
            width: 60%;
            margin: 100px auto; /* space for header */
            background-color: #f5f5f5;
            padding: 20px;
            height: 250px;
            overflow: auto; /* scroll if overflow */
            border-radius: 10px;
        }

        /* Profile Image */
        .container img {
            float: left;
            width: 120px;
            height: 120px;
            margin-right: 20px;
        }

        /* Text Content */
        .content {
            text-align: center;
        }

        /* Contact Info Box */
        .contact-box {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 180px;
            background-color: #ddd;
            padding: 15px;
            text-align: center;

            /* Vertical Line using border */
            border-left: 3px solid #555;
        }

        /* Clear float */
        .clear {
            clear: both;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        Company Contact Card
    </div>

    <!-- Contact Card -->
    <div class="container">

        <!-- Profile Image -->
        <img src="https://media.istockphoto.com/id/2022468311/vector/single-man-stick-figure-icon.jpg?s=2048x2048&w=is&k=20&c=OvAccjnFXY-OOMbH2wvQRhevH__HRJMz5nAR529vuN8=" alt="Profile Image">

        <!-- Content -->
        <div class="content">
            <h2>John Doe</h2>
            <h4>Software Engineer</h4>
            <p>
                John is a dedicated software engineer with experience in web development 
                and backend systems. He enjoys solving complex problems and building 
                efficient applications.
            </p>
        </div>

        <!-- Contact Info -->
        <div class="contact-box">
            <h4>Contact Info</h4>
            <p>📞 9876543210</p>
            <p>✉️ john@example.com</p>
        </div>

        <!-- Clear float -->
        <div class="clear"></div>

    </div>

</body>
</html>
