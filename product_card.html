<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>

    <style>
        .card {
            border: 2px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin: 30px auto;
            width: 40%;
            height: 400px;
            text-align: center;
        }

        .card img {
            max-width: 100%;
            min-width: 200px;
            height: auto;
            border-radius: 10px;
        }

        h3 {
            margin: 10px 0;
        }

        p {
            padding: 5px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="https://via.placeholder.com/300" alt="Product Image">

        <h3>Smart Watch</h3>

        <p>
            A stylish and modern smartwatch with fitness tracking, notifications,
            and long battery life.
        </p>
    </div>

</body>
</html>
