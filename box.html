<!DOCTYPE html>
<html>
<head>
    <title>Box Model Layered</title>

    <style>
        .outer {
            border: 5px solid blue;
            padding: 20px;
            width: 300px;
            margin: 50px auto;
        }

        .middle {
            border: 5px solid green;
            padding: 20px;
        }

        .inner {
            border: 5px solid red;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="outer">
        <div class="middle">
            <div class="inner">
                Layered Box Model
            </div>
        </div>
    </div>

</body>
</html>
