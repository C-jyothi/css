<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Featured Blog Section</title>

<style>

/* BODY */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* BLOG SECTION */
.blog-section{
    padding:40px;
    background:white;

    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

/* BLOG CARD */
.blog-card{
    width:300px;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    padding-bottom:20px;
}

/* IMAGES */
.blog-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* STYLE ONLY .jpg IMAGES */
img[src$=".jpg"]{
    border-top-right-radius:30px;
    border-bottom-left-radius:30px;
}

/* CONTENT */
.blog-content{
    padding:15px;
}

.blog-content h2{
    margin-bottom:10px;
}

/* LINKS */
.blog-content a{
    text-decoration:none;
    font-weight:bold;
}

/* HIGHLIGHT ONLY https LINKS */
a[href^="https"]{
    color:red;
}

/* RESPONSIVE DESIGN */
@media (max-width:600px){

    .blog-section{
        flex-direction:column;
        align-items:center;
    }

    .blog-content h2{
        font-size:20px;
    }

    .blog-content p,
    .blog-content a{
        font-size:14px;
    }
}

/* PORTRAIT ORIENTATION */
@media (orientation:portrait){

    .blog-section{
        background:lightyellow;
    }
}

</style>
</head>

<body>

<section class="blog-section">

    <!-- BLOG 1 -->
    <div class="blog-card">
        <img src="https://plus.unsplash.com/premium_photo-1673292293042-cafd9c8a3ab3?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8bmF0dXJlfGVufDB8fDB8fHww" alt="Nature Image">

        <div class="blog-content">
            <h2>Nature Beauty</h2>

            <p>Explore the beauty of forests, rivers, and mountains.</p>

            <a href="https://example.com">Read More</a>
        </div>
    </div>

    <!-- BLOG 2 -->
    <div class="blog-card">
        <img src="https://img.freepik.com/free-photo/top-view-table-full-food_23-2149209253.jpg?semt=ais_hybrid&w=740&q=80" alt="Food Image">

        <div class="blog-content">
            <h2>Delicious Foods</h2>

            <p>Discover tasty dishes and healthy recipes.</p>

            <a href="http://example.com">Read More</a>
        </div>
    </div>

    <!-- BLOG 3 -->
    <div class="blog-card">
        <img src="https://images.unsplash.com/photo-1607068891828-f16297950a66?q=80&w=1202&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Travel Image">

        <div class="blog-content">
            <h2>Travel Adventures</h2>

            <p>Find exciting destinations for your next trip.</p>

            <a href="https://travel.com">Read More</a>
        </div>
    </div>

</section>

</body>
</html>
